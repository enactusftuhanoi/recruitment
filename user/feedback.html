<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Enactus FTU Hanoi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root {
            --primary: #f8f3ce;
            --primary-light: #ffd54f;
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --white: #ffffff;
            --error: #ef4444;
            --error-light: #fee2e2;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --info: #3b82f6;
            --info-light: #dbeafe;
            --border-radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Plus Jakarta Sans", sans-serif;
        }

        body {
            background-color: var(--gray-50);
            color: var(--gray-800);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background-color: var(--white);
            padding: 16px 24px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 50px;
            width: auto;
        }

        .logo-text {
            margin-left: 12px;
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--gray-800);
        }

        .logout-btn {
            padding: 8px 16px;
            background-color: var(--gray-100);
            border: none;
            border-radius: var(--border-radius);
            color: var(--gray-700);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
        }

        .logout-btn:hover {
            background-color: var(--error-light);
            color: var(--error);
        }

        .logout-btn i {
            margin-right: 8px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 24px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* Feedback Form */
        .feedback-container {
            background-color: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 24px;
        }

        .feedback-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 8px;
            text-align: center;
        }

        .feedback-subtitle {
            font-size: 16px;
            color: var(--gray-600);
            margin-bottom: 24px;
            text-align: center;
        }

        .section {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--gray-200);
        }

        .section:last-child {
            border-bottom: none;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
        }

        .section-title i {
            margin-right: 8px;
            font-size: 20px;
        }

        .question {
            margin-bottom: 24px;
        }

        .question-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 12px;
        }

        .required-star {
            color: var(--error);
            margin-left: 4px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
        }

        .option:hover {
            background-color: var(--gray-50);
            border-color: var(--gray-300);
        }

        .option.selected {
            background-color: var(--primary);
            border-color: var(--primary-light);
        }

        .option input[type="radio"],
        .option input[type="checkbox"] {
            margin-top: 2px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .option label {
            cursor: pointer;
            flex: 1;
            font-size: 15px;
        }

        .text-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: var(--border-radius);
            font-size: 15px;
            transition: var(--transition);
            background: var(--white);
        }

        .text-input:focus {
            outline: none;
            border-color: var(--info);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .text-input.error {
            border-color: var(--error);
        }

        .rating-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 8px 0;
            flex-wrap: wrap;
        }

        .rating-option {
            font-size: 28px;
            cursor: pointer;
            transition: var(--transition);
            padding: 4px 8px;
            border-radius: 8px;
            user-select: none;
        }

        .rating-option:hover {
            transform: scale(1.15);
            background-color: var(--gray-50);
        }

        .rating-option.selected {
            transform: scale(1.15);
            background-color: var(--warning-light);
        }

        .tag-input-container {
            position: relative;
        }

        .tag-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: var(--border-radius);
            font-size: 15px;
            transition: var(--transition);
        }

        .tag-input:focus {
            outline: none;
            border-color: var(--info);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .tag-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--white);
            border: 2px solid var(--gray-200);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            margin-top: 4px;
        }

        .tag-suggestion {
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--gray-100);
            transition: var(--transition);
        }

        .tag-suggestion:hover {
            background-color: var(--gray-50);
        }

        .tag-suggestion:last-child {
            border-bottom: none;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: var(--info-light);
            color: var(--info);
            padding: 4px 10px;
            border-radius: 20px;
            margin: 4px 4px 4px 0;
            font-size: 14px;
            font-weight: 500;
        }

        .tag i {
            cursor: pointer;
            font-size: 12px;
            opacity: 0.7;
        }

        .tag i:hover {
            opacity: 1;
        }

        .char-counter {
            font-size: 12px;
            color: var(--gray-500);
            text-align: right;
            margin-top: 4px;
        }

        .char-counter.warning {
            color: var(--warning);
        }

        .char-counter.danger {
            color: var(--error);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--success);
            color: var(--white);
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 16px;
        }

        .submit-btn:hover:not(:disabled) {
            background-color: #059669;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .submit-btn:disabled {
            background-color: var(--gray-300);
            color: var(--gray-500);
            cursor: not-allowed;
            transform: none;
        }

        /* Status Messages */
        .status-message {
            padding: 14px 20px;
            border-radius: var(--border-radius);
            margin-bottom: 16px;
            display: none;
            font-weight: 500;
        }

        .status-success {
            background-color: var(--success-light);
            color: #065f46;
            border: 1px solid var(--success);
            display: block;
        }

        .status-error {
            background-color: var(--error-light);
            color: #991b1b;
            border: 1px solid var(--error);
            display: block;
        }

        .status-warning {
            background-color: var(--warning-light);
            color: #92400e;
            border: 1px solid var(--warning);
            display: block;
        }

        .status-info {
            background-color: var(--info-light);
            color: #1e40af;
            border: 1px solid var(--info);
            display: block;
        }

        /* Access Denied */
        .access-denied {
            text-align: center;
            padding: 60px 24px;
            background: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .access-denied i {
            font-size: 64px;
            color: var(--error);
            margin-bottom: 24px;
        }

        .access-denied h2 {
            color: var(--error);
            margin-bottom: 16px;
        }

        .access-denied p {
            color: var(--gray-600);
            margin-bottom: 24px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .back-btn {
            padding: 10px 24px;
            background-color: var(--gray-100);
            border: none;
            border-radius: var(--border-radius);
            color: var(--gray-700);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background-color: var(--gray-200);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray-500);
        }

        .loading i {
            font-size: 32px;
            margin-bottom: 12px;
            display: block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            background-color: var(--white);
            padding: 16px 24px;
            text-align: center;
            color: var(--gray-500);
            font-size: 14px;
            border-top: 1px solid var(--gray-200);
            margin-top: auto;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            .logo {
                justify-content: center;
            }

            .user-section {
                justify-content: center;
            }

            .main-content {
                padding: 12px;
            }

            .feedback-container {
                padding: 16px;
            }

            .rating-container {
                gap: 4px;
            }

            .rating-option {
                font-size: 22px;
                padding: 2px 6px;
            }
        }

        @media (max-width: 480px) {
            .feedback-title {
                font-size: 20px;
            }

            .question-text {
                font-size: 14px;
            }

            .option {
                padding: 10px 12px;
            }

            .option label {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <img src="/assets/logo_den.png" alt="Enactus FTU Hanoi Logo">
            <div class="logo-text">Enactus FTU Hanoi</div>
        </div>
        <div class="user-section">
            <div class="user-avatar" id="user-avatar">U</div>
            <button class="logout-btn" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                Đăng xuất
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Status Messages -->
        <div id="status-message" class="status-message"></div>

        <!-- Loading -->
        <div id="loading-state" class="loading">
            <i class="fas fa-spinner"></i>
            <p>Đang tải dữ liệu...</p>
        </div>

        <!-- Access Denied -->
        <div id="access-denied" class="access-denied" style="display: none;">
            <i class="fas fa-lock"></i>
            <h2>Không có quyền truy cập</h2>
            <p id="access-message">Bạn chưa được cấp quyền để gửi feedback hoặc không nằm trong danh sách ứng viên vòng 3.</p>
            <button class="back-btn" onclick="window.location.href='../dashboard.html'">
                <i class="fas fa-arrow-left"></i>
                Quay về Dashboard
            </button>
        </div>

        <!-- Feedback Form -->
        <div id="feedback-form-container" class="feedback-container" style="display: none;">
            <h1 class="feedback-title">Feedback</h1>
            <p class="feedback-subtitle">Chia sẻ trải nghiệm của bạn sau quá trình tham gia vòng 3</p>

            <form id="feedback-form" novalidate>
                <!-- Form sẽ được render động bằng JavaScript -->
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 Enactus FTU Hanoi. All rights reserved.
    </div>

    <!-- ====== CONFIG FIREBASE ====== -->
    <script>
        // Cấu hình Firebase - COPY TỪ FILE config.js CỦA BẠN
        var firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
    </script>

    <!-- ====== MAIN SCRIPT ====== -->
    <script>
        // ============================================================
        // KIỂM TRA FIREBASE ĐÃ SẴN SÀNG
        // ============================================================
        if (typeof firebase === 'undefined' || !firebase.app) {
            console.error('Firebase chưa được khởi tạo!');
            alert('Lỗi: Firebase chưa được khởi tạo. Vui lòng tải lại trang.');
        }

        // ============================================================
        // GLOBAL STATE
        // ============================================================
        let currentUser = null;
        let currentApplication = null;
        let teamMembers = [];
        let feedbackSubmitted = false;
        let questions = [];

        // ============================================================
        // FIREBASE AUTH LISTENER
        // ============================================================
        auth.onAuthStateChanged(async (user) => {
            // Nếu chưa đăng nhập -> chuyển về login
            if (!user) {
                window.location.href = "../login.html";
                return;
            }

            try {
                // Lấy thông tin account từ Firestore
                const snap = await db
                    .collection("account")
                    .where("email", "==", user.email)
                    .limit(1)
                    .get();

                if (snap.empty) {
                    await auth.signOut();
                    window.location.href = "../login.html";
                    return;
                }

                const doc = snap.docs[0];
                const data = doc.data();

                currentUser = { id: doc.id, ...data };

                // Cập nhật avatar
                const avatar = document.getElementById("user-avatar");
                if (avatar) {
                    const name = data.fullname || data.email || "U";
                    avatar.textContent = name.charAt(0).toUpperCase();
                }

                // Kiểm tra quyền feedback
                await checkEligibility();

            } catch (error) {
                console.error("Lỗi khi tải thông tin:", error);
                showStatus("Có lỗi xảy ra khi tải thông tin người dùng", "error");
            }
        });

        // ============================================================
        // LOGOUT
        // ============================================================
        document.getElementById("logout-btn").addEventListener("click", function() {
            auth.signOut().then(() => {
                window.location.href = "../login.html";
            });
        });

        // ============================================================
        // CHECK ELIGIBILITY
        // ============================================================
        async function checkEligibility() {
            try {
                // 1. Kiểm tra hệ thống có bật không
                const settingsDoc = await db.collection("system").doc("feedback_settings").get();
                
                if (!settingsDoc.exists || settingsDoc.data().enabled !== true) {
                    showAccessDenied("Hệ thống feedback hiện chưa được kích hoạt");
                    return;
                }

                // 2. Kiểm tra thời hạn
                if (settingsDoc.data().deadline) {
                    const deadline = settingsDoc.data().deadline.toDate();
                    if (new Date() > deadline) {
                        showAccessDenied("⏰ Thời hạn gửi feedback đã kết thúc");
                        return;
                    }
                }

                // 3. Kiểm tra ứng viên vòng 3
                const appSnapshot = await db
                    .collection("applications")
                    .where("email", "==", currentUser.email)
                    .limit(1)
                    .get();

                if (appSnapshot.empty) {
                    showAccessDenied("Không tìm thấy thông tin ứng viên");
                    return;
                }

                const appDoc = appSnapshot.docs[0];
                const appData = appDoc.data();
                currentApplication = { id: appDoc.id, ...appData };

                if (appData.current_round !== "round3") {
                    showAccessDenied("Bạn không nằm trong danh sách ứng viên vòng 3");
                    return;
                }

                if (!appData.round3 || !appData.round3.team) {
                    showAccessDenied("Bạn chưa được xếp vào team cho vòng 3");
                    return;
                }

                if (!appData.feedback_permission) {
                    showAccessDenied("Bạn chưa được cấp quyền gửi feedback. Vui lòng liên hệ admin.");
                    return;
                }

                // 4. Load team members
                await loadTeamMembers(appData.round3.team);

                // 5. Load questions từ Firestore
                await loadQuestions();

                // 6. Kiểm tra đã gửi feedback chưa
                await checkFeedbackSubmission(appDoc.id);

                // 7. Hiển thị form
                showFeedbackForm();

            } catch (error) {
                console.error("Lỗi khi kiểm tra điều kiện:", error);
                showStatus("Có lỗi xảy ra khi kiểm tra điều kiện", "error");
            }
        }

        // ============================================================
        // LOAD QUESTIONS FROM FIRESTORE
        // ============================================================
        async function loadQuestions() {
            try {
                const doc = await db.collection("system").doc("feedback_questions").get();
                if (doc.exists && doc.data().questions) {
                    questions = doc.data().questions;
                } else {
                    // Fallback: tạo câu hỏi mặc định
                    questions = getDefaultQuestions();
                    await db.collection("system").doc("feedback_questions").set({ 
                        questions: questions, 
                        updatedAt: new Date() 
                    });
                }
                console.log("✅ Đã tải", questions.length, "câu hỏi");
            } catch (error) {
                console.error("Lỗi tải câu hỏi:", error);
                questions = getDefaultQuestions();
            }
        }

        function getDefaultQuestions() {
            return [
                { id: "q1", text: "Tuần teamwork của bạn diễn ra như thế nào?", type: "radio", required: true, options: ["Rất tệ", "Chưa tốt", "Bình thường", "Tốt", "Rất tốt"] },
                { id: "q2", text: "Bạn cảm thấy mình phát triển được điều gì nhất?", type: "textarea", required: true, placeholder: "Chia sẻ điều bạn học được...", maxLength: 500 },
                { id: "q3", text: "Đánh giá khả năng dẫn dắt của Team Lead", type: "rating", required: true, maxRating: 5 },
                { id: "q4", text: "Không khí làm việc của nhóm bạn như thế nào?", type: "radio", required: true, options: ["Căng thẳng", "Thiếu giao tiếp", "Ổn", "Thoải mái", "Rất tích cực"] },
                { id: "q5", text: "Thành viên bạn thấy đáng học hỏi nhất", type: "tag", required: false, placeholder: "Gõ @ để tag thành viên" },
                { id: "q6", text: "Đánh giá Supporter của nhóm", type: "radio", required: true, options: ["Không hỗ trợ gì", "Ít hỗ trợ", "Bình thường", "Nhiệt tình", "Rất tuyệt"] },
                { id: "q7", text: "Trải lòng về vòng 3", type: "textarea", required: false, placeholder: "Chia sẻ cảm nhận...", maxLength: 1000 },
            ];
        }

        // ============================================================
        // LOAD TEAM MEMBERS
        // ============================================================
        async function loadTeamMembers(teamName) {
            try {
                const teamSnapshot = await db
                    .collection("applications")
                    .where("round3.team", "==", teamName)
                    .get();

                teamMembers = [];
                teamSnapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.email !== currentUser.email) {
                        teamMembers.push({
                            id: doc.id,
                            name: data.fullname || "Ứng viên",
                            email: data.email
                        });
                    }
                });

                console.log("✅ Team members loaded:", teamMembers.length, "người");
            } catch (error) {
                console.error("Lỗi khi tải danh sách thành viên:", error);
                teamMembers = [];
            }
        }

        // ============================================================
        // CHECK FEEDBACK SUBMISSION
        // ============================================================
        async function checkFeedbackSubmission(appId) {
            try {
                const feedbackSnapshot = await db
                    .collection("feedback")
                    .where("applicantId", "==", appId)
                    .limit(1)
                    .get();

                if (!feedbackSnapshot.empty) {
                    feedbackSubmitted = true;
                    showStatus("✅ Bạn đã gửi feedback trước đó. Cảm ơn bạn đã đóng góp!", "success");
                }
            } catch (error) {
                console.error("Lỗi khi kiểm tra feedback:", error);
            }
        }

        // ============================================================
        // SHOW ACCESS DENIED
        // ============================================================
        function showAccessDenied(message) {
            document.getElementById("loading-state").style.display = "none";
            document.getElementById("access-denied").style.display = "block";
            document.getElementById("feedback-form-container").style.display = "none";
            
            const msgEl = document.getElementById("access-message");
            if (msgEl && message) {
                msgEl.textContent = message;
            }
        }

        // ============================================================
        // SHOW FEEDBACK FORM
        // ============================================================
        function showFeedbackForm() {
            document.getElementById("loading-state").style.display = "none";
            document.getElementById("access-denied").style.display = "none";
            document.getElementById("feedback-form-container").style.display = "block";
            
            renderDynamicQuestions();
        }

        // ============================================================
        // RENDER DYNAMIC QUESTIONS
        // ============================================================
        function renderDynamicQuestions() {
            const form = document.getElementById("feedback-form");
            if (!form) return;
            
            form.innerHTML = "";

            if (!questions || questions.length === 0) {
                form.innerHTML = `<div class="status-message status-warning">Chưa có câu hỏi nào được cấu hình.</div>`;
                return;
            }

            // Tạo section
            const section = document.createElement("div");
            section.className = "section";
            section.innerHTML = `
                <h2 class="section-title">
                    <i class="fas fa-question-circle"></i>
                    Câu hỏi đánh giá
                </h2>
            `;

            questions.forEach((q, index) => {
                const questionElement = renderQuestion(q, index + 1);
                if (questionElement) {
                    section.appendChild(questionElement);
                }
            });

            form.appendChild(section);

            // Thêm nút submit
            const submitBtn = document.createElement("button");
            submitBtn.type = "submit";
            submitBtn.className = "submit-btn";
            submitBtn.id = "submit-btn";
            submitBtn.textContent = feedbackSubmitted ? "✅ Đã gửi Feedback" : "📤 Gửi Feedback";
            submitBtn.disabled = feedbackSubmitted;
            form.appendChild(submitBtn);

            // Event submit
            form.addEventListener("submit", handleFormSubmit);
        }

        // ============================================================
        // RENDER INDIVIDUAL QUESTION
        // ============================================================
        function renderQuestion(q, index) {
            const div = document.createElement("div");
            div.className = "question";
            div.dataset.questionId = q.id;

            const text = document.createElement("p");
            text.className = "question-text";
            text.innerHTML = `<span style="color:var(--gray-400);font-weight:500;margin-right:8px;">${index}.</span> ${q.text}`;
            if (q.required) {
                text.innerHTML += ' <span class="required-star">*</span>';
            }
            div.appendChild(text);

            switch (q.type) {
                case "radio":
                    div.appendChild(renderRadio(q));
                    break;
                case "checkbox":
                    div.appendChild(renderCheckbox(q));
                    break;
                case "text":
                    div.appendChild(renderText(q));
                    break;
                case "textarea":
                    div.appendChild(renderTextarea(q));
                    break;
                case "rating":
                    div.appendChild(renderRating(q));
                    break;
                case "tag":
                    div.appendChild(renderTag(q));
                    break;
                default:
                    div.innerHTML += `<p style="color:var(--gray-400);font-size:14px;">Loại câu hỏi không hỗ trợ</p>`;
            }

            return div;
        }

        // ============================================================
        // RENDER RADIO
        // ============================================================
        function renderRadio(q) {
            const container = document.createElement("div");
            container.className = "options-container";

            (q.options || []).forEach((option, idx) => {
                const id = `${q.id}-${idx}`;
                const optionDiv = document.createElement("div");
                optionDiv.className = "option";

                optionDiv.innerHTML = `
                    <input type="radio" id="${id}" name="${q.id}" value="${option}" ${q.required ? "required" : ""}>
                    <label for="${id}">${option}</label>
                `;

                const radio = optionDiv.querySelector("input");
                radio.addEventListener("change", function() {
                    optionDiv.closest(".options-container").querySelectorAll(".option").forEach(opt => {
                        opt.classList.remove("selected");
                    });
                    if (this.checked) {
                        optionDiv.classList.add("selected");
                    }
                });

                container.appendChild(optionDiv);
            });

            return container;
        }

        // ============================================================
        // RENDER CHECKBOX
        // ============================================================
        function renderCheckbox(q) {
            const container = document.createElement("div");
            container.className = "options-container";

            (q.options || []).forEach((option, idx) => {
                const id = `${q.id}-${idx}`;
                const optionDiv = document.createElement("div");
                optionDiv.className = "option";

                optionDiv.innerHTML = `
                    <input type="checkbox" id="${id}" name="${q.id}" value="${option}">
                    <label for="${id}">${option}</label>
                `;

                const checkbox = optionDiv.querySelector("input");
                checkbox.addEventListener("change", function() {
                    if (this.checked) {
                        optionDiv.classList.add("selected");
                    } else {
                        optionDiv.classList.remove("selected");
                    }
                });

                container.appendChild(optionDiv);
            });

            return container;
        }

        // ============================================================
        // RENDER TEXT
        // ============================================================
        function renderText(q) {
            const input = document.createElement("input");
            input.type = "text";
            input.className = "text-input";
            input.id = q.id;
            input.name = q.id;
            input.placeholder = q.placeholder || "";
            input.maxLength = q.maxLength || 500;
            input.required = q.required || false;
            return input;
        }

        // ============================================================
        // RENDER TEXTAREA
        // ============================================================
        function renderTextarea(q) {
            const container = document.createElement("div");

            const textarea = document.createElement("textarea");
            textarea.className = "text-input";
            textarea.id = q.id;
            textarea.name = q.id;
            textarea.placeholder = q.placeholder || "";
            textarea.rows = 4;
            textarea.maxLength = q.maxLength || 1000;
            textarea.required = q.required || false;

            const maxLen = q.maxLength || 1000;
            const counter = document.createElement("div");
            counter.className = "char-counter";
            counter.innerHTML = `<span id="${q.id}-counter">0</span> / ${maxLen}`;

            textarea.addEventListener("input", function() {
                const count = this.value.length;
                const counterSpan = document.getElementById(`${q.id}-counter`);
                if (counterSpan) {
                    counterSpan.textContent = count;
                }
                counter.className = "char-counter";
                if (count > maxLen * 0.9) {
                    counter.classList.add("warning");
                }
                if (count >= maxLen) {
                    counter.classList.add("danger");
                }
            });

            container.appendChild(textarea);
            container.appendChild(counter);
            return container;
        }

        // ============================================================
        // RENDER RATING
        // ============================================================
        function renderRating(q) {
            const container = document.createElement("div");
            container.className = "rating-container";

            const maxRating = q.maxRating || 5;

            for (let i = 1; i <= maxRating; i++) {
                const star = document.createElement("div");
                star.className = "rating-option";
                star.dataset.value = i;
                star.innerHTML = "⭐".repeat(i);
                star.title = `${i} sao`;

                star.addEventListener("click", function() {
                    const parent = this.closest(".rating-container");
                    parent.querySelectorAll(".rating-option").forEach(s => s.classList.remove("selected"));
                    this.classList.add("selected");
                    
                    const hidden = parent.querySelector(`input[type="hidden"]`);
                    if (hidden) {
                        hidden.value = i;
                    }
                });

                container.appendChild(star);
            }

            const hidden = document.createElement("input");
            hidden.type = "hidden";
            hidden.id = q.id;
            hidden.name = q.id;
            hidden.required = q.required || false;

            container.appendChild(hidden);
            return container;
        }

        // ============================================================
        // RENDER TAG
        // ============================================================
        function renderTag(q) {
            const container = document.createElement("div");

            const inputContainer = document.createElement("div");
            inputContainer.className = "tag-input-container";

            const input = document.createElement("input");
            input.type = "text";
            input.className = "tag-input";
            input.id = `${q.id}-input`;
            input.placeholder = q.placeholder || "Gõ @ để tag thành viên";

            const suggestions = document.createElement("div");
            suggestions.className = "tag-suggestions";
            suggestions.id = `${q.id}-suggestions`;

            inputContainer.appendChild(input);
            inputContainer.appendChild(suggestions);

            const tagsContainer = document.createElement("div");
            tagsContainer.id = `${q.id}-tags`;
            tagsContainer.style.marginTop = "8px";

            const hidden = document.createElement("input");
            hidden.type = "hidden";
            hidden.id = q.id;
            hidden.name = q.id;

            container.appendChild(inputContainer);
            container.appendChild(tagsContainer);
            container.appendChild(hidden);

            // State cho tag
            let selectedTags = [];

            // Xử lý input tag
            input.addEventListener("input", function() {
                const value = this.value;
                
                if (value.includes("@")) {
                    const searchTerm = value.split("@").pop().toLowerCase();
                    
                    if (searchTerm.length > 0) {
                        const filtered = teamMembers.filter(m => 
                            m.name.toLowerCase().includes(searchTerm) &&
                            !selectedTags.some(t => t.id === m.id)
                        );
                        showTagSuggestions(filtered, q.id);
                    } else {
                        showTagSuggestions(
                            teamMembers.filter(m => !selectedTags.some(t => t.id === m.id)),
                            q.id
                        );
                    }
                } else {
                    hideTagSuggestions(q.id);
                }
            });

            input.addEventListener("blur", function() {
                setTimeout(() => hideTagSuggestions(q.id), 300);
            });

            input.addEventListener("keydown", function(e) {
                if (e.key === "Enter" && this.value.trim()) {
                    e.preventDefault();
                    const searchTerm = this.value.trim().toLowerCase();
                    const found = teamMembers.find(m => 
                        m.name.toLowerCase().includes(searchTerm) &&
                        !selectedTags.some(t => t.id === m.id)
                    );
                    if (found) {
                        addTag(found, q.id);
                        this.value = "";
                        hideTagSuggestions(q.id);
                    }
                }
            });

            function showTagSuggestions(members, qId) {
                const suggEl = document.getElementById(`${qId}-suggestions`);
                if (!suggEl) return;
                
                suggEl.innerHTML = "";
                
                if (members.length === 0) {
                    suggEl.innerHTML = '<div class="tag-suggestion" style="color:var(--gray-400);">Không tìm thấy thành viên</div>';
                } else {
                    members.forEach(member => {
                        const div = document.createElement("div");
                        div.className = "tag-suggestion";
                        div.textContent = member.name;
                        div.addEventListener("mousedown", function(e) {
                            e.preventDefault();
                            addTag(member, qId);
                            document.getElementById(`${qId}-input`).value = "";
                            hideTagSuggestions(qId);
                        });
                        suggEl.appendChild(div);
                    });
                }
                
                suggEl.style.display = "block";
            }

            function hideTagSuggestions(qId) {
                const suggEl = document.getElementById(`${qId}-suggestions`);
                if (suggEl) suggEl.style.display = "none";
            }

            function addTag(member, qId) {
                if (selectedTags.some(t => t.id === member.id)) return;
                selectedTags.push(member);
                updateTagsDisplay(qId);
            }

            function removeTag(memberId, qId) {
                selectedTags = selectedTags.filter(t => t.id !== memberId);
                updateTagsDisplay(qId);
            }

            function updateTagsDisplay(qId) {
                const container = document.getElementById(`${qId}-tags`);
                const hidden = document.getElementById(qId);
                
                if (!container) return;
                
                container.innerHTML = "";
                
                selectedTags.forEach(tag => {
                    const tagEl = document.createElement("span");
                    tagEl.className = "tag";
                    tagEl.innerHTML = `${tag.name} <i class="fas fa-times"></i>`;
                    tagEl.querySelector("i").addEventListener("click", function(e) {
                        e.stopPropagation();
                        removeTag(tag.id, qId);
                    });
                    container.appendChild(tagEl);
                });
                
                if (hidden) {
                    hidden.value = JSON.stringify(selectedTags);
                }
            }

            return container;
        }

        // ============================================================
        // FORM SUBMISSION
        // ============================================================
        async function handleFormSubmit(event) {
            event.preventDefault();

            if (feedbackSubmitted) {
                showStatus("Bạn đã gửi feedback trước đó", "warning");
                return;
            }

            // Validate
            if (!validateForm()) {
                return;
            }

            // Disable button
            const submitBtn = document.getElementById("submit-btn");
            submitBtn.disabled = true;
            submitBtn.textContent = "⏳ Đang gửi...";

            try {
                // Thu thập dữ liệu
                const formData = {
                    applicantId: currentApplication.id,
                    applicantName: currentUser.fullname || currentUser.email,
                    applicantEmail: currentUser.email,
                    team: currentApplication.round3?.team || "",
                    timestamp: new Date(),
                    answers: {}
                };

                // Lấy câu trả lời cho từng câu hỏi
                questions.forEach(q => {
                    const questionDiv = document.querySelector(`.question[data-question-id="${q.id}"]`);
                    if (!questionDiv) return;

                    let answer = null;

                    switch (q.type) {
                        case "radio": {
                            const selected = questionDiv.querySelector('input[type="radio"]:checked');
                            answer = selected ? selected.value : null;
                            break;
                        }
                        case "checkbox": {
                            const checked = questionDiv.querySelectorAll('input[type="checkbox"]:checked');
                            answer = checked.length > 0 ? Array.from(checked).map(cb => cb.value) : null;
                            break;
                        }
                        case "text":
                        case "textarea": {
                            const input = questionDiv.querySelector(".text-input");
                            answer = input ? input.value.trim() : null;
                            break;
                        }
                        case "rating": {
                            const hidden = questionDiv.querySelector('input[type="hidden"]');
                            answer = hidden ? hidden.value : null;
                            if (answer) answer = parseInt(answer);
                            break;
                        }
                        case "tag": {
                            const hidden = document.getElementById(q.id);
                            if (hidden && hidden.value) {
                                try {
                                    answer = JSON.parse(hidden.value);
                                } catch (e) {
                                    answer = null;
                                }
                            }
                            break;
                        }
                    }

                    if (answer !== null && answer !== "") {
                        formData.answers[q.id] = answer;
                    }
                });

                // Lưu vào Firestore
                await db.collection("feedback").add(formData);

                feedbackSubmitted = true;
                submitBtn.textContent = "✅ Đã gửi Feedback";
                submitBtn.disabled = true;
                showStatus("✅ Cảm ơn bạn đã gửi feedback! Đóng góp của bạn rất có giá trị.", "success");

                // Cập nhật trạng thái đã gửi trong ứng dụng
                await db.collection("applications").doc(currentApplication.id).update({
                    feedback_submitted: true,
                    feedback_submitted_at: new Date()
                });

            } catch (error) {
                console.error("Lỗi khi gửi feedback:", error);
                showStatus("❌ Có lỗi xảy ra khi gửi feedback. Vui lòng thử lại.", "error");
                submitBtn.disabled = false;
                submitBtn.textContent = "📤 Gửi Feedback";
            }
        }

        // ============================================================
        // VALIDATE FORM
        // ============================================================
        function validateForm() {
            let isValid = true;
            let firstError = null;

            // Xóa class error cũ
            document.querySelectorAll(".text-input.error").forEach(el => el.classList.remove("error"));

            for (const q of questions) {
                if (!q.required) continue;

                const questionDiv = document.querySelector(`.question[data-question-id="${q.id}"]`);
                if (!questionDiv) continue;

                let hasValue = false;

                switch (q.type) {
                    case "radio": {
                        const selected = questionDiv.querySelector('input[type="radio"]:checked');
                        hasValue = !!selected;
                        break;
                    }
                    case "checkbox": {
                        hasValue = true;
                        break;
                    }
                    case "text":
                    case "textarea": {
                        const input = questionDiv.querySelector(".text-input");
                        if (input) {
                            hasValue = input.value.trim() !== "";
                            if (!hasValue) {
                                input.classList.add("error");
                            }
                        }
                        break;
                    }
                    case "rating": {
                        const hidden = questionDiv.querySelector('input[type="hidden"]');
                        hasValue = hidden && hidden.value !== "";
                        break;
                    }
                    case "tag": {
                        hasValue = true;
                        break;
                    }
                    default:
                        hasValue = true;
                }

                if (!hasValue) {
                    isValid = false;
                    if (!firstError) {
                        firstError = q.text;
                        questionDiv.scrollIntoView({ behavior: "smooth", block: "center" });
                    }
                }
            }

            if (!isValid) {
                showStatus(`⚠️ Vui lòng trả lời câu hỏi bắt buộc: "${firstError}"`, "error");
                return false;
            }

            return true;
        }

        // ============================================================
        // SHOW STATUS MESSAGE
        // ============================================================
        function showStatus(message, type) {
            const statusEl = document.getElementById("status-message");
            statusEl.textContent = message;
            statusEl.className = `status-message status-${type}`;
            statusEl.style.display = "block";

            if (type === "success") {
                setTimeout(() => {
                    statusEl.style.display = "none";
                }, 6000);
            }
        }

        console.log("✅ User Feedback page loaded successfully!");
    </script>
</body>
